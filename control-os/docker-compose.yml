      LOG_LEVEL: info
    ports:
      - "8792:8792"
    depends_on:
      postgres:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    networks:
      - control-os-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8792/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # =========================================================================
  # Sending API
  # =========================================================================
  sending-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control-os-sending-api
    environment:
      SERVICE_NAME: sending-api
      NODE_ENV: production
      PORT: 8788
      HOST: 0.0.0.0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: control_os
      POSTGRES_USER: control_os_user
      POSTGRES_PASSWORD: control_os_pass
      CONTROL_CORS_ALLOW_DEV_ORIGINS: "false"
      LOG_LEVEL: info
    ports:
      - "8788:8788"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - control-os-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8788/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # =========================================================================
  # Cloud Browser API
  # =========================================================================
  cloud-browser-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control-os-cloud-browser-api
    environment:
      SERVICE_NAME: cloud-browser-api
      NODE_ENV: production
      PORT: 8787
      HOST: 0.0.0.0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: control_os
      POSTGRES_USER: control_os_user
      POSTGRES_PASSWORD: control_os_pass
      CONTROL_CORS_ALLOW_DEV_ORIGINS: "false"
      LOG_LEVEL: info
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - control-os-network

  # =========================================================================
  # Google Accounts API
  # =========================================================================
  google-accounts-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control-os-google-accounts-api
    environment:
      SERVICE_NAME: google-accounts-api
      NODE_ENV: production
      PORT: 8789
      HOST: 0.0.0.0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: control_os
      POSTGRES_USER: control_os_user
      POSTGRES_PASSWORD: control_os_pass
      CONTROL_CORS_ALLOW_DEV_ORIGINS: "false"
      LOG_LEVEL: info
    ports:
      - "8789:8789"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - control-os-network

  # =========================================================================
  # Calendar Invite API
  # =========================================================================
  calendar-invite-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control-os-calendar-invite-api
    environment:
      SERVICE_NAME: calendar-invite-api
      NODE_ENV: production
      PORT: 8790
      HOST: 0.0.0.0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: control_os
      POSTGRES_USER: control_os_user
      POSTGRES_PASSWORD: control_os_pass
      CONTROL_CORS_ALLOW_DEV_ORIGINS: "false"
      LOG_LEVEL: info
    ports:
      - "8790:8790"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - control-os-network

  # =========================================================================
  # Redis Cache
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: control-os-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control-os-network

  # =========================================================================
  # Prometheus Monitoring
  # =========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: control-os-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/rules/alert-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - auth-api
      - root-app-api
    networks:
      - control-os-network

  # =========================================================================
  # Grafana Dashboards
  # =========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: control-os-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set}
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - control-os-network

  # =========================================================================
  # Jaeger Distributed Tracing
  # =========================================================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: control-os-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "9411:9411"
    networks:
      - control-os-network

  # =========================================================================
  # Postgres Exporter for Prometheus
  # =========================================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: control-os-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://control_os_user:control_os_pass@postgres:5432/control_os?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - control-os-network

  # =========================================================================
  # Node Exporter for System Metrics
  # =========================================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: control-os-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - control-os-network

  # =========================================================================
  # Swagger UI for API Documentation
  # =========================================================================
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: control-os-swagger-ui
    environment:
      URL: ./openapi.yml
      URLS: |
        [
          { url: "/specs/auth-api.yml", name: "Auth API" },
          { url: "/specs/root-app-api.yml", name: "Root App API" }
        ]
    ports:
      - "8080:8080"
    volumes:
      - ./api-specs:/usr/share/nginx/html/specs:ro
    networks:
      - control-os-network

  # =========================================================================
  # Nginx Reverse Proxy with TLS
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: control-os-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - auth-api
      - root-app-api
      - swagger-ui
    networks:
      - control-os-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  control-os-network:
    driver: bridge
