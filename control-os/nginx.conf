user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 20M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/xml text/javascript
             application/x-javascript application/xml+rss
             application/json application/javascript;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

  # Upstream service definitions
  upstream auth_api {
    server auth-api:8779;
    keepalive 32;
  }

  upstream root_app_api {
    server root-app-api:8792;
    keepalive 32;
  }

  upstream sending_api {
    server sending-api:8788;
    keepalive 32;
  }

  upstream cloud_browser_api {
    server cloud-browser-api:8787;
    keepalive 32;
  }

  upstream google_accounts_api {
    server google-accounts-api:8789;
    keepalive 32;
  }

  upstream calendar_invite_api {
    server calendar-invite-api:8790;
    keepalive 32;
  }

  # HTTP redirect to HTTPS
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # HTTPS server
  server {
    listen 443 ssl http2;
    server_name control-os.com www.control-os.com;

    # SSL certificates (replace with actual certificate paths)
    ssl_certificate /etc/nginx/certs/control-os.crt;
    ssl_certificate_key /etc/nginx/certs/control-os.key;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # CORS for API endpoints
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
    add_header 'Access-Control-Max-Age' '3600' always;

    # Handle OPTIONS requests
    if ($request_method = 'OPTIONS') {
      return 204;
    }

    # Frontend - React app
    location / {
      proxy_pass http://frontend:5173;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth API
    location /api/auth/ {
      limit_req zone=login_limit burst=10 nodelay;
      limit_req zone=api_limit burst=200 nodelay;
      proxy_pass http://auth_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_send_timeout 10s;
      proxy_read_timeout 10s;
    }

    # Root App API
    location /api/ {
      limit_req zone=api_limit burst=200 nodelay;
      proxy_pass http://root_app_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    # Health checks (bypass rate limiting)
    location /health {
      access_log off;
      proxy_pass http://root_app_api;
      proxy_connect_timeout 2s;
      proxy_read_timeout 2s;
    }

    # Metrics endpoint (restrict to internal IPs only)
    location /metrics {
      access_log off;
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      deny all;
      proxy_pass http://auth_api;
    }

    # Swagger UI documentation
    location /docs/ {
      proxy_pass http://swagger-ui:8080/;
      proxy_set_header Host $host;
    }

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
